force_water:
  name: Force Water
  description: Force immediate watering for a zone or all zones.
  fields:
    zone_id:
      name: Zone ID
      description: The zone to water. Leave empty for all zones.
      required: false
      example: "back"
      selector:
        text:
    mm_to_apply:
      name: Amount (mm)
      description: How much water to apply. Defaults to max per cycle.
      required: false
      example: 5.0
      selector:
        number:
          min: 1
          max: 15
          step: 0.5
          unit_of_measurement: mm

run_sequence:
  name: Run Sequence (timed cascade)
  description: >-
    Water zones for a fixed number of minutes each, in cascade, respecting the
    max-concurrent-zones limit. Useful for watering-in fertilizer. If a run is
    already in progress, the zones are queued and start as slots free up.
  fields:
    minutes:
      name: Minutes per zone
      description: How long to run each zone.
      required: true
      example: 60
      selector:
        number:
          min: 1
          max: 360
          step: 5
          unit_of_measurement: min
    zone_ids:
      name: Zones
      description: Zone IDs to run. Leave empty for all zones.
      required: false
      example: '["back", "mid"]'
      selector:
        object:

skip_day:
  name: Skip Day
  description: Skip the next scheduled watering check.

reset_deficit:
  name: Reset Deficit
  description: Reset water deficit to 0 for a zone or all zones.
  fields:
    zone_id:
      name: Zone ID
      description: The zone to reset. Leave empty for all zones.
      required: false
      example: "back"
      selector:
        text:
